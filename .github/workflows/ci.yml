name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm test:browser:install

      - name: Validate mobile API contract
        run: pnpm api:check

      - name: Test catalog seed
        run: pnpm catalog:test

      - name: Check App boundaries
        run: pnpm boundary:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build standalone App
        run: pnpm build

      - name: Build enterprise App
        run: VITE_API_BASE_URL=https://api.example.com pnpm build:enterprise
